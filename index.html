<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хемија I — 300 Прашања за Натпревар</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d2d3f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a0533 0%, #0d0d1a 50%, #001a0d 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(16,185,129,0.1) 0%, transparent 60%);
  }
  header h1 {
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -1px;
    position: relative;
    background: linear-gradient(90deg, #a855f7, #7c3aed, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-top: 0.5rem;
    position: relative;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: flex;
    gap: 1rem;
    justify-content: center;
    padding: 1.5rem 2rem;
    flex-wrap: wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .score-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.6rem 1.2rem;
    text-align: center;
    min-width: 100px;
  }
  .score-card .label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-card .value {
    font-size: 1.4rem;
    font-weight: 800;
    margin-top: 0.2rem;
  }
  .score-card.points .value { color: var(--accent2); }
  .score-card.correct .value { color: var(--green); }
  .score-card.wrong .value { color: var(--red); }
  .score-card.total .value { color: var(--yellow); }

  /* FILTERS */
  .filters {
    padding: 1.5rem 2rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filters span {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    padding: 0 2rem;
    margin: 1rem 0;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 100px;
    transition: width 0.4s ease;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* QUESTIONS GRID */
  .questions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
    padding: 1.5rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .question-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .question-card.answered-correct { border-color: var(--green); background: rgba(16,185,129,0.05); }
  .question-card.answered-wrong { border-color: var(--red); background: rgba(239,68,68,0.05); }
  .question-card.hidden { display: none; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.8rem;
    gap: 0.5rem;
  }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
  }
  .q-tag {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .tag-t1 { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .tag-t2 { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
  .tag-t3 { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }

  .q-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 0.8rem;
    font-weight: 600;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.8rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent2); background: rgba(168,85,247,0.1); color: white; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: rgba(16,185,129,0.2); border-color: var(--green); color: #34d399; }
  .option-btn.wrong { background: rgba(239,68,68,0.15); border-color: var(--red); color: #fc8181; }
  .option-btn.reveal { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.4); color: #34d399; }

  .feedback {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    margin-top: 0.6rem;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    display: none;
    line-height: 1.4;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(16,185,129,0.1); color: #34d399; }
  .feedback.nope { background: rgba(239,68,68,0.1); color: #fc8181; }

  .reset-btn {
    margin-top: 0.5rem;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    padding: 2rem;
    flex-wrap: wrap;
  }
  .action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 1.4rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .action-btn.primary:hover { background: var(--accent2); }

  /* FINAL SCORE MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 2.5rem;
    max-width: 400px;
    width: 90%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .modal::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(124,58,237,0.1), transparent 70%);
  }
  .modal h2 { font-size: 1.6rem; font-weight: 800; color: var(--accent2); margin-bottom: 0.5rem; position: relative; }
  .modal .big-score { font-size: 4rem; font-weight: 800; font-family: 'Space Mono', monospace; position: relative; }
  .modal p { color: var(--muted); font-size: 0.85rem; margin: 0.5rem 0; position: relative; }
  .modal .grade { font-size: 1.2rem; font-weight: 700; margin: 1rem 0; position: relative; }
  .close-modal {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 0.7rem 2rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: white;
    cursor: pointer;
    margin-top: 1rem;
    font-size: 0.9rem;
    position: relative;
  }

  @media (max-width: 600px) {
    .questions { grid-template-columns: 1fr; padding: 1rem; }
    .scoreboard { padding: 1rem; }
    .filters { padding: 1rem; }
    header { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>⚗️ ХЕМИЈА — 300 ПРАШАЊА ЗА НАТПРЕВАР</h1>
  <p>ТЕМА 1: Градба на атом &nbsp;·&nbsp; ТЕМА 2: Хемиски врски &nbsp;·&nbsp; ТЕМА 3: Неоргански соединенија</p>
</header>

<div class="scoreboard">
  <div class="score-card points"><div class="label">Поени</div><div class="value" id="scorePoints">0</div></div>
  <div class="score-card correct"><div class="label">Точни</div><div class="value" id="scoreCorrect">0</div></div>
  <div class="score-card wrong"><div class="label">Погрешни</div><div class="value" id="scoreWrong">0</div></div>
  <div class="score-card total"><div class="label">Одговорени</div><div class="value" id="scoreTotal">0/300</div></div>
</div>

<div style="padding: 0 2rem; margin-top: 1rem;">
<div class="progress-bar-wrap" style="padding:0">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-info"><span id="progressText">0 / 300 прашања</span><span id="progressPct">0%</span></div>
</div>
</div>

<div class="filters">
  <span>Филтер:</span>
  <button class="filter-btn active" onclick="filterQ('all')">Сите (300)</button>
  <button class="filter-btn" onclick="filterQ('t1')">Тема 1 — Атом (100)</button>
  <button class="filter-btn" onclick="filterQ('t2')">Тема 2 — Врски (100)</button>
  <button class="filter-btn" onclick="filterQ('t3')">Тема 3 — Неорг. (100)</button>
  <button class="filter-btn" onclick="filterQ('wrong')">Само погрешни</button>
  <button class="filter-btn" onclick="filterQ('unanswered')">Неодговорени</button>
</div>

<div class="actions">
  <button class="action-btn" onclick="shuffleAll()">🔀 Промешај</button>
  <button class="action-btn" onclick="resetAll()">🔄 Ресетирај сè</button>
  <button class="action-btn primary" onclick="showFinalScore()">📊 Финален резултат</button>
</div>

<div class="questions" id="questionsContainer"></div>

<div class="actions" style="padding-top:0;">
  <button class="action-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆ Назад горе</button>
  <button class="action-btn" onclick="resetAll()">🔄 Ресетирај сè</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>📊 Финален Резултат</h2>
    <div class="big-score" id="modalBigScore">0</div>
    <p id="modalSubtext">поени</p>
    <div class="grade" id="modalGrade"></div>
    <p id="modalStats"></p>
    <button class="close-modal" onclick="document.getElementById('modalOverlay').classList.remove('show')">Затвори</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
// ============================
// ТЕМА 1: ГРАДБА НА АТОМ (100)
// ============================
// --- 1.1 Градба на атом, атомски/масен број ---
{id:1,theme:'t1',text:'Атомскиот број (Z) на еден елемент го покажува:',opts:['Бројот на неутрони во јадрото','Бројот на протони во атомското јадро','Збирот на протони и неутрони','Бројот на електрони во последниот слој'],ans:1,exp:'Z = броj на протони = редниот број на елементот.'},
{id:2,theme:'t1',text:'Масениот број (А) е:',opts:['Бројот на протони','Бројот на неутрони','Збир на протони и неутрони','Бројот на електронски слоеви'],ans:2,exp:'А = Z + N(неутрони).'},
{id:3,theme:'t1',text:'Атомот на хлорот содржи 17 протони и 20 неутрони. Масениот број е:',opts:['17','20','37','34'],ans:2,exp:'А = 17 + 20 = 37.'},
{id:4,theme:'t1',text:'Бројот на електрони во неутралниот атом на калциум (Z=20) е:',opts:['20','40','18','10'],ans:0,exp:'Неутрален атом: N(e⁻) = Z = 20.'},
{id:5,theme:'t1',text:'Атомот на фосфор ³¹P₁₅ содржи колку неутрони?',opts:['15','16','31','46'],ans:1,exp:'N = A − Z = 31 − 15 = 16.'},
{id:6,theme:'t1',text:'Кој научник го предложил планетарниот (нуклеарен) атомски модел?',opts:['Бор','Далтон','Радерфорд','Шредингер'],ans:2,exp:'Ернест Радерфорд, 1911 г.'},
{id:7,theme:'t1',text:'Според Радерфордовиот модел, протоните се наоѓаат во:',opts:['Електронската обвивка','Атомското јадро','Рамномерно низ атомот','Надвор од атомот'],ans:1,exp:'Протоните (и неутроните) се во атомското јадро.'},
{id:8,theme:'t1',text:'Масата на атомот е концентрирана главно во:',opts:['Електронската обвивка','Атомското јадро','Рамномерно низ атомот','Петте p-орбитали'],ans:1,exp:'Јадрото содржи p+ и n0 со скоро сета маса.'},
{id:9,theme:'t1',text:'Релативниот полнеж на протонот е:',opts:['-1','0','+1','+2'],ans:2,exp:'Протонот: полнеж +1, маса ≈ 1 a.j.m.'},
{id:10,theme:'t1',text:'Релативниот полнеж на електронот е:',opts:['+1','0','-1','-2'],ans:2,exp:'Електронот: полнеж -1, маса занемарливо мала.'},
{id:11,theme:'t1',text:'Неутронот има:',opts:['Позитивен полнеж','Негативен полнеж','Нема полнеж','Двоен позитивен полнеж'],ans:2,exp:'Неутронот е електрично неутрална честичка.'},
{id:12,theme:'t1',text:'Нуклидите со ист атомски број, а различен масен број се:',opts:['Изобари','Изотопи','Нуклиди','Радиоизотопи'],ans:1,exp:'Изотопи = ист Z, различно A (различен број неутрони).'},
{id:13,theme:'t1',text:'Изобарите имаат:',opts:['Ист атомски број','Ист масен број, различен Z','Ист број неутрони','Иста маса само ако се изотопи'],ans:1,exp:'Изобари = ист A, различен Z → различни елементи.'},
{id:14,theme:'t1',text:'Водородот ¹H, ²H (деутериум), ³H (тритиум) се:',opts:['Изобари','Алотропски модификации','Изотопи','Различни елементи'],ans:2,exp:'Сите три имаат Z=1, различен A → изотопи.'},
{id:15,theme:'t1',text:'Релативната атомска маса на природниот хлор е ≈35,5. Причина:',opts:['Хлорот нема изотопи','Хлорот е смеса од ³⁵Cl и ³⁷Cl со различни уделе','Хлорот секогаш е трид','Бројот на протони е 35,5'],ans:1,exp:'Природниот Cl е смеса од ³⁵Cl (75,5%) и ³⁷Cl (24,5%).'},
{id:16,theme:'t1',text:'Ако Ar(¹H)=1, x(¹H)=99,98% и Ar(²H)=2, x(²H)=0,02%, релативната атомска маса на природниот водород е приближно:',opts:['1,0','1,5','2,0','1,0002'],ans:3,exp:'Ar = 0,9998·1 + 0,0002·2 ≈ 1,0002.'},
{id:17,theme:'t1',text:'Радиоактивните изотопи (радиоизотопи) се:',opts:['Стабилни нуклиди','Нестабилни нуклиди кои спонтано се разложуваат','Изобари со долго траење','Хемиски елементи со низок Z'],ans:1,exp:'Нестабилни нуклиди → емитираат зрачење при распаѓање.'},
{id:18,theme:'t1',text:'Радиоизотопот ⁶⁰Co се користи во медицината за:',opts:['Пребројување хромозоми','Лекување на рак со зрачење','Диагностика на срцеви болести','Производство на инсулин'],ans:1,exp:'⁶⁰Co емитира γ-зраци кои ги уништуваат раковите клетки.'},
{id:19,theme:'t1',text:'Методата ¹⁴C радиоактивно датирање ја одредува:',opts:['Старост на живи организми','Старост на ископини, фосили и јаглен','Концентрација на изотопи во море','Количество на јаглерод во воздухот'],ans:1,exp:'¹⁴C се распаѓа бавно; полуживот ~5700 год.'},
{id:20,theme:'t1',text:'Кои честички ги има во атомското јадро?',opts:['Само протони','Само неутрони','Протони и неутрони','Протони и електрони'],ans:2,exp:'Јадрото: протони (p⁺) и неутрони (n⁰).'},

// --- 1.2 Квантни броеви и орбитали ---
{id:21,theme:'t1',text:'Главниот квантен број (n) ја одредува:',opts:['Формата на орбиталата','Ориентацијата на орбиталата','Енергетското ниво и растојанието од јадрото','Спинот на електронот'],ans:2,exp:'n = 1,2,3,... → енергетско ниво и слој.'},
{id:22,theme:'t1',text:'Орбиталниот квантен број (l) може да добие вредности од:',opts:['1 до n','0 до n-1','−l до +l','0 до n'],ans:1,exp:'l = 0, 1, 2, ..., n−1.'},
{id:23,theme:'t1',text:'За n=3, можните вредности на l се:',opts:['0,1,2','0,1,2,3','1,2,3','0,1'],ans:0,exp:'l = 0 до n−1 = 0,1,2.'},
{id:24,theme:'t1',text:'Магнетниот квантен број (ml) за l=2 може да биде:',opts:['0,1,2','-2,-1,0,1,2','-1,0,1','-3,-2,-1,0,1,2,3'],ans:1,exp:'ml = −l до +l = −2,−1,0,+1,+2 (вкупно 5 вредности).'},
{id:25,theme:'t1',text:'Спинскиот квантен број (ms) може да биде:',opts:['0 или 1','-½ или +½','-1 или +1','+½ само'],ans:1,exp:'Само два можни спина: ms = +½ или −½.'},
{id:26,theme:'t1',text:'Кој квантен број ја определува формата на орбиталата?',opts:['n','l','ml','ms'],ans:1,exp:'l=0 → s-орб., l=1 → p-орб., l=2 → d-орб., l=3 → f-орб.'},
{id:27,theme:'t1',text:'Ориентацијата на орбиталата во просторот ја определува:',opts:['n','l','ml','ms'],ans:2,exp:'ml ја определува ориентацијата на орбиталата.'},
{id:28,theme:'t1',text:'За l=0 (s-орбитала), бројот на можни вредности на ml е:',opts:['1','3','5','7'],ans:0,exp:'2l+1 = 1, само ml=0.'},
{id:29,theme:'t1',text:'Колку p-орбитали постојат во еден слој (n≥2)?',opts:['1','3','5','7'],ans:1,exp:'За l=1: ml = -1,0,+1 → 3 орбитали.'},
{id:30,theme:'t1',text:'Колку d-орбитали постојат за n≥3?',opts:['3','5','7','10'],ans:1,exp:'За l=2: ml = -2,-1,0,+1,+2 → 5 орбитали.'},
{id:31,theme:'t1',text:'Која комбинација на квантни броеви НЕ е можна? ',opts:['n=2, l=1, ml=0, ms=½','n=3, l=2, ml=-2, ms=-½','n=2, l=3, ml=0, ms=½','n=4, l=0, ml=0, ms=-½'],ans:2,exp:'За n=2, l може да биде само 0 или 1, не 3!'},
{id:32,theme:'t1',text:'Принципот на неопределеност (Хајзенберг) вели:',opts:['Не може да се мери масата на електронот','Невозможно е истовремено точно да се знаат позицијата и брзината на електронот','Секој електрон мора да биде во s-орбитала','Атомскиот радиус не може да се мери'],ans:1,exp:'Двојната природа на електронот → принцип на неопределеност.'},
{id:33,theme:'t1',text:'Дегенерирани орбитали се:',opts:['Орбитали со иста n но различна l','Орбитали со иста n и l (иста енергија)','Само s-орбитали','Само f-орбитали'],ans:1,exp:'Дегенерирани = иста n, иста l → иста енергија, разл. ml.'},
{id:34,theme:'t1',text:'Енергијата на орбиталата зависи од збирот:',opts:['n + l','n - l','n × l','ml + ms'],ans:0,exp:'Помал n+l → пониска енергија. При ист n+l, помала n → пониска.'},
{id:35,theme:'t1',text:'Која орбитала има пониска енергија: 4s или 3d?',opts:['4s','3d','Истата','Зависи од атомот'],ans:0,exp:'4s: n+l=4+0=4; 3d: n+l=3+2=5 → 4s е пониска.'},
{id:36,theme:'t1',text:'Орбиталата 3d₂ соодветствува на:',opts:['n=3, l=2, ml=2','n=3, l=0, ml=2','n=2, l=3, ml=2','n=3, l=1, ml=2'],ans:0,exp:'Прв број = n=3, буква d → l=2, индекс 2 → ml=2.'},
{id:37,theme:'t1',text:'s-орбиталата има форма на:',opts:['Ханталата (гантла)','Сфера','Тороид','Двојна лопта'],ans:1,exp:'s-орбиталата е сферично симетрична.'},
{id:38,theme:'t1',text:'Колку вкупно орбитали постојат во третиот електронски слој (n=3)?',opts:['3','6','9','10'],ans:2,exp:'n=3 → l=0(1орб)+l=1(3орб)+l=2(5орб) = 9 орбитали.'},
{id:39,theme:'t1',text:'Боровиот атомски модел е важен затоа што:',opts:['Ги воведе квантизираните енергетски нивоа','Ја откри структурата на јадрото','Ги разликува протоните и неутроните','Го воведе принципот на Паули'],ans:0,exp:'Бор воведе квантизирани орбити → дискретни енергетски нивоа.'},
{id:40,theme:'t1',text:'Квантномеханичкиот модел (Шредингер) за разлика од Боровиот:',opts:['Нема кружни орбити, електронот е облак на веројатност','Нема квантни броеви','Не ги опишува атомите со Z>1','Е помалку точен'],ans:0,exp:'Шредингер: атомска орбитала = регион со најголема веројатност.'},

// --- 1.3 Електронска конфигурација ---
{id:41,theme:'t1',text:'Принципот на Паули вели:',opts:['Дегенерираните орбитали прво се полнат по еден','Нема два електрона со ист квантен број','Електроните прво ги пополнуваат орбиталите со пониска енергија','Секоја орбитала може да прими до 4 електрона'],ans:1,exp:'Паули: не постојат два електрона со ист сет на сите 4 квантни броја.'},
{id:42,theme:'t1',text:'Хундовото правило вели:',opts:['Орбиталите се полнат по два','Дегенерираните орбитали прво се полнат по еден електрон (ист спин), потоа спарување','Секоја орбитала прима еден по еден','Спинот секогаш е +½'],ans:1,exp:'Хунд: максимален мултиплет → минимални одбивања.'},
{id:43,theme:'t1',text:'Редоследот на пополнување орбитали (растечка енергија) е:',opts:['1s,2s,2p,3s,3p,3d,4s,...','1s,2s,2p,3s,3p,4s,3d,4p,...','1s,2p,3s,3p,4s,4p,...','2s,2p,3s,3p,3d,4s,...'],ans:1,exp:'1s,2s,2p,3s,3p,4s,3d,4p,5s,4d,5p,6s,4f,5d,6p,...'},
{id:44,theme:'t1',text:'Електронската конфигурација на натриумот (Z=11) е:',opts:['1s²2s²2p⁶3s¹','1s²2s²2p⁵','1s²2s²2p⁶3p¹','1s²2s²2p⁶3s²'],ans:0,exp:'Na: 1s²2s²2p⁶3s¹ → 11 електрони.'},
{id:45,theme:'t1',text:'Валентните електрони на кислородот (Z=8) се:',opts:['2','4','6','8'],ans:2,exp:'O: 1s²2s²2p⁴ → последниот слој (n=2): 2+4=6 валентни е⁻.'},
{id:46,theme:'t1',text:'Стабилна електронска конфигурација имаат:',opts:['Алкалните метали','Благородните (инертни) гасови','Халогените елементи','d-елементите'],ans:1,exp:'Благородни гасови: целосно пополнети ns²np⁶ → октет.'},
{id:47,theme:'t1',text:'Кој елемент има конфигурација [Ar]4s²3d¹?',opts:['Калциум','Скандиум','Калиум','Тутаниум'],ans:1,exp:'[Ar]4s²3d¹ = 18+3 = Z=21 → Скандиум (Sc).'},
{id:48,theme:'t1',text:'Кој елемент има конфигурација [Ne]3s²3p³?',opts:['Алуминиум','Магнезиум','Фосфор','Сулфур'],ans:2,exp:'[Ne]=10е + 3s²3p³ (5е) = 15е → Z=15 → Фосфор.'},
{id:49,theme:'t1',text:'Колку полупополнети орбитали има хромот (Z=24) ? Конфиг: [Ar]4s¹3d⁵',opts:['1','5','6','3'],ans:2,exp:'4s¹(1 полупополн) + 3d⁵(5 полупополн) = 6 полупополн. орб.'},
{id:50,theme:'t1',text:'Електронската конфигурација [Ar]4s²3d⁵ одговара на:',opts:['Хром','Ванадиум','Манган','Железо'],ans:2,exp:'[Ar]=18е + 4s²3d⁵ (7е) = 25е → Z=25 → Манган.'},
{id:51,theme:'t1',text:'Во скратена форма, електронската конфигурација на сулфур (Z=16) е:',opts:['[Ne]3s²3p⁴','[Ar]3s²3p⁴','[He]2s²2p⁶3s²3p⁴','[Ne]3s²3p²'],ans:0,exp:'S: [Ne]3s²3p⁴ → 10+6=16 електрони.'},
{id:52,theme:'t1',text:'Максималниот број електрони во n=2 слојот е:',opts:['2','6','8','18'],ans:2,exp:'n=2: 2s(2) + 2p(6) = 8 максимум.'},
{id:53,theme:'t1',text:'Максималниот број електрони во n=3 слојот е:',opts:['8','18','32','10'],ans:1,exp:'n=3: 3s(2)+3p(6)+3d(10)=18 максимум.'},
{id:54,theme:'t1',text:'Зошто 4s-орбиталата се пополнува пред 3d?',opts:['Бидејќи n=4 е поголемо','Бидејќи n+l=4 за 4s е помало од n+l=5 за 3d','Бидејќи s-орбиталите секогаш се прво','Зависи само од елементот'],ans:1,exp:'Критериум: n+l. 4s: 4+0=4 < 3d: 3+2=5.'},
{id:55,theme:'t1',text:'Атомот чија конфигурација е 1s²2s²2p⁶3s²3p⁶4s²3d⁶ содржи колку валентни електрони (ако е Fe)?',opts:['2','6','8','14'],ans:2,exp:'Fe (d-елемент): 4s²3d⁶ → 2+6=8 валентни електрони.'},
{id:56,theme:'t1',text:'Кој ја претставил електронската конфигурација на фосфор (Z=15) правилно?',opts:['1s²2s²2p⁶3s²3p³','1s²2s²2p⁶3s²3p⁵','1s²2s²2p⁶3s²3p²3d¹','1s²2s²2p⁵3s²3p³'],ans:0,exp:'P: 1s²2s²2p⁶3s²3p³ (2+2+6+2+3=15е).'},
{id:57,theme:'t1',text:'Колку електрони може да содржи во себе f-потслојот?',opts:['7','10','14','16'],ans:2,exp:'f-орбитали: 7 орбитали × 2е = 14 електрони.'},
{id:58,theme:'t1',text:'При прекршување на Паулиевиот принцип, две орбитали би имале:',opts:['Ист спин','Сите 4 исти квантни броеви','Различна l вредност','Само ист n'],ans:1,exp:'Паули: не два е⁻ со ист n,l,ml,ms.'},
{id:59,theme:'t1',text:'Бројот на неспарени електрони во азот (Z=7) е:',opts:['0','1','3','5'],ans:2,exp:'N: 1s²2s²2p³ → 2p-орбиталите: три полупополнети (Хунд) → 3 неспарени.'},
{id:60,theme:'t1',text:'Благородниот гас неон (Ne) има конфигурација:',opts:['1s²','1s²2s²','1s²2s²2p⁶','1s²2s²2p⁶3s²'],ans:2,exp:'Ne (Z=10): 1s²2s²2p⁶ = 10е.'},

// --- 1.4 Периоден систем ---
{id:61,theme:'t1',text:'Бројот на периодата одговара на:',opts:['Атомскиот број','Главниот квантен број на највисокиот слој','Бројот на валентни електрони','Бројот на неутрони'],ans:1,exp:'Периода 3 → највисок слој n=3.'},
{id:62,theme:'t1',text:'Во 1-ва и 2-ра група на PSE се наоѓаат:',opts:['p-елементи','s-елементи','d-елементи','f-елементи'],ans:1,exp:'Групи 1-2: пополнување s-орбитали → s-елементи.'},
{id:63,theme:'t1',text:'d-елементите се наоѓаат во групи:',opts:['1-2','3-12','13-18','18'],ans:1,exp:'Групи 3-12 → пополнување d-орбитали.'},
{id:64,theme:'t1',text:'Лантаноидите и актиноидите се:',opts:['s-елементи','p-елементи','d-елементи','f-елементи'],ans:3,exp:'Пополнување f-орбитали → f-елементи (лантаноиди, актиноиди).'},
{id:65,theme:'t1',text:'Атомскиот радиус по периода (одлево надесно):',opts:['Расте','Се намалува','Останува ист','Прво расте па се намалува'],ans:1,exp:'Повеќе протони → посилно привлекување → помал радиус.'},
{id:66,theme:'t1',text:'Атомскиот радиус по група (одгоре надолу):',opts:['Расте','Се намалува','Останува ист','Нема правилност'],ans:0,exp:'Нов слој за секој следен елемент → поголем радиус.'},
{id:67,theme:'t1',text:'Енергијата на јонизација по периода (одлево надесно):',opts:['Се намалува','Расте','Останува иста','Хаотично се менува'],ans:1,exp:'Помал радиус → е⁻ потешко се отстранува → поголема Ei.'},
{id:68,theme:'t1',text:'Електронегативноста е:',opts:['Мерка за лесното оддавање е⁻','Мерка за способноста да привлекува заеднички е⁻ во хемиска врска','Мерка за атомскиот радиус','Број на валентни е⁻'],ans:1,exp:'Електронегативност = способноста за привлекување на врзувачките е⁻.'},
{id:69,theme:'t1',text:'Кој елемент е најелектронегативен?',opts:['Кислород','Хлор','Флуор','Бром'],ans:2,exp:'Флуорот (F) има највисока електронегативност = 4,0.'},
{id:70,theme:'t1',text:'Кој елемент е најизразит метал?',opts:['Цезиум','Франциум','Литиум','Калиум'],ans:1,exp:'Франциум (Fr) е во левиот долен агол → најизразит метал.'},
{id:71,theme:'t1',text:'Металните својства по периода (одлево надесно):',opts:['Растат','Се намалуваат','Не се менуваат','Прво растат па се намалуваат'],ans:1,exp:'По периода надесно: Ei расте → потешко оддавање е⁻ → метал. св. се намалуваат.'},
{id:72,theme:'t1',text:'Елементот во 4-та периода и 6-та група (хром, Z=24) е:',opts:['s-елемент','p-елемент','d-елемент','f-елемент'],ans:2,exp:'Групи 3-12 = d-елементи → Cr е d-елемент.'},
{id:73,theme:'t1',text:'Вредноста за афинитет кон електрон по периода (одлево надесно) генерално:',opts:['Се намалува','Расте','Останува иста','Не може да се предвиди'],ans:1,exp:'Афинитетот кон е⁻ генерално расте по периода надесно.'},
{id:74,theme:'t1',text:'Елементот [Ar]4s²3d¹ е во:',opts:['3-та периода, 3-та група','4-та периода, 3-та група','4-та периода, 4-та група','3-та периода, 4-та група'],ans:1,exp:'n=4 → 4-та периода; 4s²3d¹ → 3 валентни е⁻ → 3-та група.'},
{id:75,theme:'t1',text:'Колку s-елементи има во Периодниот систем?',opts:['2','14','30','32'],ans:0,exp:'Групи 1 и 2, 7 периоди × 2 = 14, плус H и He → вкупно 14. (14 = исправно без H кое е посебно)'},
{id:76,theme:'t1',text:'Кој атом е помал: As или Bi (иста група)?',opts:['As','Bi','Еднакви','Не може да се спореди'],ans:0,exp:'As е повисоко во групата → помал радиус.'},
{id:77,theme:'t1',text:'Зошто благородните гасови немаат вредност за електронегативност?',opts:['Бидејќи не образуваат хемиски врски','Бидејќи се метали','Бидејќи имаат нула电子','Бидејќи не постојат во природа'],ans:0,exp:'Ел-негативноста е поим за атоми во хемиска врска; бл. гасови не образуваат вакви врски.'},
{id:78,theme:'t1',text:'Бројот на групата (1-18) во PSE за p-елементите (групи 13-18) дава бројот на валентни е⁻ кога:',opts:['Директно го читате','Одземете 10 од бројот на групата','Додадете 2','Го делите со 2'],ans:1,exp:'p-елементи: групи 13-18 → валентни е⁻ = група − 10.'},
{id:79,theme:'t1',text:'Лантаноидите спаѓаат во:',opts:['5-та периода','6-та периода','7-та периода','4-та периода'],ans:1,exp:'Лантаноиди: 6-та периода (4f-орбитали).'},
{id:80,theme:'t1',text:'Колку вкупно елементи постојат во PSE (досега познати)?',opts:['92','100','118','120'],ans:2,exp:'Досега познати 118 елементи, 92 во природа.'},

// Extra тема 1 questions 81-100
{id:81,theme:'t1',text:'Колку максимум електрони може да содржи n=4 слојот?',opts:['18','32','16','24'],ans:1,exp:'n=4: 4s(2)+4p(6)+4d(10)+4f(14)=32 максимум.'},
{id:82,theme:'t1',text:'Пред симболот на елементот, горниот лев индекс е:',opts:['Атомски број','Масен број','Број неутрони','Ред во PSE'],ans:1,exp:'Конвенција: ⁴⁰Ca → горно лево = масен број А.'},
{id:83,theme:'t1',text:'Атомот на бакар (Z=29) во основна состојба има конфигурација [Ar]3d¹⁰4s¹ (не [Ar]3d⁹4s²) поради:',opts:['Пониска вкупна енергија при полн заполнет 3d¹⁰','Принципот на Паули','Правилото на Хунд','Принципот на Бор'],ans:0,exp:'Целосно пополнет 3d¹⁰ е поста тоа дава пониска енергија.'},
{id:84,theme:'t1',text:'Полупополнета орбитала содржи:',opts:['0 електрони','1 електрон','2 електрони','3 електрони'],ans:1,exp:'Полупополнета = еден неспарен електрон.'},
{id:85,theme:'t1',text:'Кој научник го воведе концептот на валентни (луисовски) симболи и октетот?',opts:['Бор','Паули','Луис','Хунд'],ans:2,exp:'Гилберт Луис → луисовски симболи и октетно правило.'},
{id:86,theme:'t1',text:'Бројот на електронски слоеви за елементот Sn (Z=50) е:',opts:['4','5','6','3'],ans:1,exp:'Sn е во 5-та периода → 5 електронски слоеви.'},
{id:87,theme:'t1',text:'Електронската конфигурација на неутралниот Fe²⁺ јон (Z=26) е:',opts:['[Ar]3d⁶','[Ar]3d⁶4s²','[Ar]4s²3d⁴','[Ar]3d⁴'],ans:0,exp:'Fe: [Ar]4s²3d⁶. При ionizacija, прво губиме 4s → Fe²⁺: [Ar]3d⁶.'},
{id:88,theme:'t1',text:'Кои два квантни броја не зависат еден од друг?',opts:['n и l','l и ml','ms и n','ml и ms'],ans:3,exp:'ms е независен; секој е⁻ може да има ms=+½ или -½ без оглед на n,l,ml.'},
{id:89,theme:'t1',text:'Три дегенерирани 2p-орбитали имаат:',opts:['Иста форма и различни ориентации','Различни форми','Различна енергија','Различна l вредност'],ans:0,exp:'Сите три 2p орбитали: иста n=2, l=1, различен ml → иста е, различни ориентации.'},
{id:90,theme:'t1',text:'Кој елемент е прв p-елемент во PSE?',opts:['Хелиум','Литиум','Бор','Водород'],ans:2,exp:'Бор (Z=5): 1s²2s²2p¹ → прв со p-орбитала пополнета → прв p-елемент (3-та група, 2-ра периода).'},
{id:91,theme:'t1',text:'Релативната атомска маса на елемент е поблиска до вредноста на изотопот со:',opts:['Помала маса','Поголема маса','Поголем количествен удел','Помал количествен удел'],ans:2,exp:'Ar е средна вредност → ближу до изотопот застапен повеќе.'},
{id:92,theme:'t1',text:'Спинот на електронот може да биде визуелно претставен со:',opts:['Ротација по правец на часовникот или против','Позицијата во орбиталата','Бројот на вртења по секунда','Формата на орбиталата'],ans:0,exp:'Спин = сопствена ротација во 2 насоки → ms=+½ или -½.'},
{id:93,theme:'t1',text:'Зошто редот на пополнување 1s,2s,2p,3s,3p,4s,3d... не следи само n?',opts:['Бидејќи d-орбиталите имаат помала енергија','Бидејќи 4s (n+l=4) е ниска-енергетска од 3d (n+l=5)','Бидејќи d не постои во n=3','Случаен редослед'],ans:1,exp:'Критериумот е n+l, не само n.'},
{id:94,theme:'t1',text:'Хелиумот (He) иако е s-елемент, во PSE е сместен:',opts:['Во 1-ва група','Во 2-ра група','Во 18-та група','Во 17-та група'],ans:2,exp:'He е нобел газ → 18-та група поради сличност со бл. гасови.'},
{id:95,theme:'t1',text:'Кој e блокот на елементи за кои при пополнување се полни 4f-потслојот?',opts:['s-блок','p-блок','d-блок','f-блок'],ans:3,exp:'f-блок: пополнување f-орбитали (лантаноиди, актиноиди).'},
{id:96,theme:'t1',text:'Секоја периода завршува со:',opts:['Алкален метал','Халоген','Благороден гас','Земноалкален метал'],ans:2,exp:'Секоја периода завршува со благороден гас (целосен октет/дублет).'},
{id:97,theme:'t1',text:'Малите периоди во PSE се:',opts:['1, 2, 3','4, 5','6, 7','2, 3'],ans:3,exp:'2-ра и 3-та периода содржат по 8 елементи → мали периоди.'},
{id:98,theme:'t1',text:'Во четвртата периода, покрај s и p елементите, постојат и:',opts:['f-елементи','d-елементи','Само p-елементи','Само s-елементи'],ans:1,exp:'4-та периода: 4s, 3d(10е), 4p → вклучува d-елементи.'},
{id:99,theme:'t1',text:'Колку p-елементи постојат вкупно во PSE?',opts:['18','30','36','12'],ans:2,exp:'6 групи × 6 периоди (2-7) = 36 p-елементи.'},
{id:100,theme:'t1',text:'Кој принцип не е поврзан со пополнувањето на орбиталите?',opts:['Принцип на Паули','Хундово правило','Принцип на растечка енергија','Принцип на Архимед'],ans:3,exp:'Принципот на Архимед е физика (плавечка сила), нема врска со квантни броеви.'},

{id:101,theme:'t2',text:'Јонска врска се образува меѓу:',opts:['Два неметали','Типичен метал и типичен неметал','Два метали','Метал и метал'],ans:1,exp:'Јонска врска: метал (низок Ei) + неметал (висок афинитет) → пренос на е⁻.'},
{id:102,theme:'t2',text:'При образување јонска врска, атомот на металот:',opts:['Прима електрони','Оддава електрони и станува катјон','Образува заеднички е⁻ парови','Останува неутрален'],ans:1,exp:'Метал: оддава е⁻ → катјон (позитивен јон).'},
{id:103,theme:'t2',text:'Атомот на неметалот при јонска врска:',opts:['Оддава електрони','Прима електрони и станува анјон','Образува σ-врска','Останува неутрален'],ans:1,exp:'Неметал: прима е⁻ → анјон (негативен јон).'},
{id:104,theme:'t2',text:'Октетното правило вели дека атомите при сврзување:',opts:['Стремат да имаат 8 е⁻ во последниот слој','Стремат да немаат е⁻','Образуваат само 4 врски','Оддаваат само 1 е⁻'],ans:0,exp:'Атомите образуваат врски за да постигнат електронска конфигурација на бл. гасови (8 е⁻).'},
{id:105,theme:'t2',text:'Луисовски симболи ги претставуваат:',opts:['Само јадрото','Само е⁻ во јадрото','Јадрото и внатрешните е⁻, со точки за валентните е⁻','Само неспарени е⁻'],ans:2,exp:'Луисов симбол: хем. симбол (јадро+внатр.е⁻) + точки за валентни е⁻.'},
{id:106,theme:'t2',text:'Електронската конфигурација на Na⁺ (Z=11) е:',opts:['1s²2s²2p⁶3s¹','1s²2s²2p⁶','1s²2s²2p⁵','1s²2s²2p⁶3s²'],ans:1,exp:'Na губи 3s¹ е⁻ → Na⁺: 1s²2s²2p⁶ = конфиг. на Ne.'},
{id:107,theme:'t2',text:'Електронската конфигурација на Cl⁻ (Z=17) е:',opts:['[Ne]3s²3p⁵','[Ne]3s²3p⁶=[Ar]','[Ne]3s²3p⁴','[Ar]3s²'],ans:1,exp:'Cl прима 1е⁻ → Cl⁻: [Ne]3s²3p⁶ = конфиг. на Ar.'},
{id:108,theme:'t2',text:'Јонските кристали при собни услови се:',opts:['Гасовити','Течни','Цврсти','Аморфни'],ans:2,exp:'Силни електростатски сили → цврста состојба при собни услови.'},
{id:109,theme:'t2',text:'Јонски градените супстанци во цврста состојба:',opts:['Спроведуваат електричество','НЕ спроведуваат, но го спроведуваат во раствор или растоп','Секогаш се неутрални','Не се топат'],ans:1,exp:'Во цврсто: јоните не можат да се движат. Во раствор/растоп: слободни јони.'},
{id:110,theme:'t2',text:'Координацискиот број во NaCl е:',opts:['4','6','8','12'],ans:1,exp:'Во NaCl, секој Na⁺ е опкружен со 6 Cl⁻ и обратно.'},
{id:111,theme:'t2',text:'Катјонот на некој метал е ПОМАЛ од атомот бидејќи:',opts:['Изгубил протони','Изгубил е⁻ → јадрото посилно привлекува преостанатите е⁻','Добил неутрони','Добил е⁻'],ans:1,exp:'Позитивен јон: изгубени е⁻ → помалку одбивање → посилно привлекување → мал радиус.'},
{id:112,theme:'t2',text:'Анјонот е ПОГОЛЕМ од атомот бидејќи:',opts:['Добил протони','Добил е⁻ → поголемо одбивање → поголем радиус','Изгубил неутрони','Изгубил е⁻'],ans:1,exp:'Негативен јон: повеќе е⁻ → поголемо одбивање → поголем радиус.'},
{id:113,theme:'t2',text:'Формулна единка е поим кај:',opts:['Молекулски соединенија','Јонски соединенија','Метали','Атомски кристали'],ans:1,exp:'Јонски соед. не образуваат молекули → поим е формулна единка (емпириска формула).'},
{id:114,theme:'t2',text:'Ковалентната врска се образува со:',opts:['Пренос на е⁻ меѓу атоми','Образување заеднички е⁻ парови меѓу атоми','Привлекување на спротивно наелектризирани јони','Метален е⁻ гас'],ans:1,exp:'Ковалентна врска: заеднички е⁻ парови, претежно меѓу неметали.'},
{id:115,theme:'t2',text:'σ-врска (сигма) е врска образувана со:',opts:['Странично препокривање на p-орбитали','Препокривање по интернуклеарна оска','Само препокривање на s-орбитали','Само препокривање на d-орбитали'],ans:1,exp:'σ-врска = препокривање по оска (frontally). Сите единични врски се σ.'},
{id:116,theme:'t2',text:'π-врска (пи) се образува со:',opts:['Аксијално препокривање','Странично препокривање на орбитали (p или d)','Само со s-орбитали','Пренос на е⁻'],ans:1,exp:'π-врска: странично (lateralno) препокривање; обично p-p.'},
{id:117,theme:'t2',text:'Тројната врска (N₂) се состои од:',opts:['3 σ-врски','1σ + 2π','2σ + 1π','3π'],ans:1,exp:'N₂: 1 σ-врска (по оска) + 2 π-врски (странично) = тројна врска.'},
{id:118,theme:'t2',text:'Двојната врска (O₂) се состои од:',opts:['2 σ-врски','2 π-врски','1σ + 1π','2σ'],ans:2,exp:'O₂: 1 σ + 1 π = двојна врска.'},
{id:119,theme:'t2',text:'Со зголемување на редот на врската (1→2→3):',opts:['Должината расте, јачината расте','Должината се намалува, јачината расте','Должината расте, јачината се намалува','Нема промени'],ans:1,exp:'Повеќе е⁻ парови → пократка и посилна врска.'},
{id:120,theme:'t2',text:'Неполарна ковалентна врска се образува кога:',opts:['Разликата во ел-негативноста е голема','Разликата во ел-негативноста е нула или блиска до 0','Атомите се со различна ел-негатив.','Врската е јонска'],ans:1,exp:'Хомоатомски молекули (H₂, Cl₂) → неполарна ков. врска (Δχ=0).'},
{id:121,theme:'t2',text:'Поларна ковалентна врска постои кога разликата во ел-негативноста е:',opts:['0','Поголема од 2','Меѓу 0,4 и 2','Помала од 0,1'],ans:2,exp:'Δχ 0,4-2,0 → поларна ковалентна. Δχ>2 → јонска.'},
{id:122,theme:'t2',text:'Во молекулата HF, атомот на F е:',opts:['δ+ (делумно позитивен)','δ- (делумно негативен)','Неутрален','Со целосен негативен полнеж'],ans:1,exp:'F е поелектронегативен → заедн. е⁻ пар е покај F → F добива δ-.'},
{id:123,theme:'t2',text:'Несврзувачки електронски парови НЕ учествуваат во:',opts:['Образувањето на октет','Образувањето на хемиска врска','Структурата на молекулата','Хемиите на молекулите'],ans:1,exp:'Несврзувачки (lone pair) е⁻ парови не градат врска, само го пополнуваат октет.'},
{id:124,theme:'t2',text:'Вандервалсовски сили се:',opts:['Сили меѓу јони','Слаби меѓумолекулски интеракции','Ковалентни врски','Метални врски'],ans:1,exp:'Вандервалсовски сили = слаби меѓумолекулски интеракции (лондоновски, дипол-дипол).'},
{id:125,theme:'t2',text:'Лондоновски (дисперзиски) сили постојат меѓу:',opts:['Само поларни молекули','Само јони','Неполарни молекули (и сите молекули)','Само метали'],ans:2,exp:'Лондоновски сили: привремена поларизација → дејствуваат кај сите молекули.'},
{id:126,theme:'t2',text:'Водородна врска се образува кога H е сврзан со:',opts:['Јаглерод','F, O, или N (силно ел-негативни елементи)','Сулфур','Хлор'],ans:1,exp:'H-врска: H-F, H-O, H-N → меѓумолекулска интеракција.'},
{id:127,theme:'t2',text:'Водата има релативно висока точка на вриење поради:',opts:['Голема молекулска маса','Силни водородни врски меѓу молекулите','Поларни ковалентни врски','Атомски кристал'],ans:1,exp:'Водородните врски во водата се посилни → потребна е повеќе е за нивно раскинување.'},
{id:128,theme:'t2',text:'Аномалијата на водата е:',opts:['Водата замрзнува на 0°C','Мразот е помал во волумен од течна вода','Мразот е полесен (помала густина) од течна вода','Водата врие на 100°C'],ans:2,exp:'Мраз: правилна структура со шуплини (водородни врски) → поголем волумен → помала густина.'},
{id:129,theme:'t2',text:'Атомски (ковалентни) кристали се одликуваат со:',opts:['Ниски точки на топење','Многу висока тврдост и виосоки точки на топење','Лесна растворливост во вода','Слаба ел. спроводливост'],ans:1,exp:'Дијамант: атомски кристал → најтврда супстанца, висока Tm.'},
{id:130,theme:'t2',text:'Молекулски кристали (сулфур, јод) имаат:',opts:['Многу висока точка на топење','Ниска точка на топење и кртост','Добра ел. спроводливост','Се раствораат само во вода'],ans:1,exp:'Молекулски кристали: слаби вандервалсовски/Н-врски → ниска Tm, кртост.'},
{id:131,theme:'t2',text:'Металната врска според моделот на „електронски гас" е:',opts:['Пренос на е⁻ меѓу два атома','Катјони на метал „потопени" во море од делокализирани е⁻','Заеднички е⁻ парови','Електростатско привлекување јони'],ans:1,exp:'Метален е⁻ гас: катјони + делокализирани е⁻ → метална врска.'},
{id:132,theme:'t2',text:'Металите се добри спроводници на ел. струја поради:',opts:['Слабата метална врска','Слободните делокализирани е⁻','Кристалната решетка','Силните јонски врски'],ans:1,exp:'Слободни е⁻ во металот → движење под напон → спроводливост.'},
{id:133,theme:'t2',text:'Ковливоста на металите се должи на:',opts:['Слабата јонска врска','Слоевите метален катјони можат да се поместат без да ги скинат e⁻-газ врски','Кртата структура','Малиот атомски радиус'],ans:1,exp:'Е⁻ газот се движи со слоевите → металите не се кршат при деформација.'},
{id:134,theme:'t2',text:'Дијамантот е пример за:',opts:['Молекулски кристал','Метален кристал','Атомски (ковалентен) кристал','Јонски кристал'],ans:2,exp:'Дијамант: C-C ковалентни врски во 3D → атомски кристал.'},
{id:135,theme:'t2',text:'Графитот за разлика од дијамантот:',opts:['Е подобар електроспроводник и слоевита структура','Е потврд и понедактилен','Ги нема делокализирани е⁻','Не е алотропска модификација на C'],ans:0,exp:'Графит: слоевита структура, делокализирани е⁻ → добар ел. спроводник.'},
{id:136,theme:'t2',text:'Во кои супстанци постојат водородни врски?',opts:['CH₄','HF, H₂O, NH₃','Cl₂','Na'],ans:1,exp:'H-врски: само кога H е директно врзан за F, O или N.'},
{id:137,theme:'t2',text:'Разлика во ел-негативност поголема од 2 укажува на:',opts:['Неполарна ков. врска','Поларна ков. врска','Јонска врска','Метална врска'],ans:2,exp:'Δχ > 2 → јонска врска (пренос на е⁻).'},
{id:138,theme:'t2',text:'Ред на врска (bond order) за N₂ е:',opts:['1','2','3','4'],ans:2,exp:'N₂: тројна врска → ред 3 (1σ + 2π).'},
{id:139,theme:'t2',text:'σ-врска во H₂ се образува со:',opts:['Страничко препокривање на 1s','Аксијално препокривање на 1s орбитали','Препокривање на 2p','Препокривање на 2s и 2p'],ans:1,exp:'H₂: две 1s орбитали се препокриваат по интернуклеарна оска → σ.'},
{id:140,theme:'t2',text:'Во молекулата CO₂, јаглеродот образува:',opts:['Две единични врски','Две тројни врски','Две двојни врски (σ+π секоја)','Три единични врски'],ans:2,exp:'CO₂: O=C=O → две двојни врски, секоја = 1σ+1π.'},
{id:141,theme:'t2',text:'Поларните молекули меѓусебе образуваат:',opts:['Само лондоновски сили','Дипол-дипол интеракции','Само водородни врски','Нема интеракции'],ans:1,exp:'Поларни молекули: δ+ ↔ δ- привлекување → дипол-дипол интеракции.'},
{id:142,theme:'t2',text:'Кои кристали образуваат јонски соединенија?',opts:['Молекулски','Атомски','Јонски','Метални'],ans:2,exp:'NaCl, KBr и сл. → јонски кристали.'},
{id:143,theme:'t2',text:'Дипол-дипол интеракциите се:',opts:['Посилни од лондоновските','Послаби','Исто јаки','Нема разлика'],ans:0,exp:'Поларни молекули (трајни диполи) → посилни интеракции од привремената поларизација.'},
{id:144,theme:'t2',text:'Кој тип кристал е мразот?',opts:['Јонски','Атомски','Молекулски','Метален'],ans:2,exp:'Мраз: молекули H₂O поврзани со водородни врски → молекулски кристал.'},
{id:145,theme:'t2',text:'Највисока електрична спроводливост во цврста состојба имаат:',opts:['Јонски кристали','Молекулски кристали','Метали','Атомски кристали'],ans:2,exp:'Метали: слободни е⁻ → добра ел. спроводливост.'},
{id:146,theme:'t2',text:'Натриум хлорид (NaCl) при топење:',opts:['Не спроведува струја','Почнува да спроведува струја бидејќи јоните се слободни','Станува метал','Го губи јонскиот карактер'],ans:1,exp:'Во растоп: Na⁺ и Cl⁻ слободно се движат → ел. спроводливост.'},
{id:147,theme:'t2',text:'s-орбиталата МОЖЕ да учествува во образување:',opts:['Само σ-врски','Само π-врски','И σ и π-врски','Ниту σ, ниту π'],ans:0,exp:'s-орбитали се сферни → само аксијално препокривање → само σ.'},
{id:148,theme:'t2',text:'Во молекулата NH₃, бројот на несврзувачки е⁻ парови кај N е:',opts:['0','1','2','3'],ans:1,exp:'N: 5 валентни е⁻, три се користат за N-H врски → 1 несврзувачки пар.'},
{id:149,theme:'t2',text:'Сребро (Ag) е:',opts:['Најдобар ел. спроводник','Нај-лош ел. спроводник меѓу металите','Полупроводник','Изолатор'],ans:0,exp:'Сребро е најдобар ел. спроводник меѓу металите.'},
{id:150,theme:'t2',text:'Графитот е добар ел. спроводник поради:',opts:['Јонски карактер','Делокализирани π-електрони меѓу слоевите','Ковалентна 3D структура','Водородни врски'],ans:1,exp:'Графит: слоевита структура со делокализирани е⁻ → спроводливост.'},
{id:151,theme:'t2',text:'Координацискиот број на Cs⁺ во CsCl е:',opts:['4','6','8','12'],ans:2,exp:'CsCl: голем Cs⁺ → координациски број 8.'},
{id:152,theme:'t2',text:'Зошто NaCl има висока точка на топење?',opts:['Поради ниска јонска врска','Поради силни електростатски привлечни сили меѓу Na⁺ и Cl⁻','Поради метална врска','Поради водородни врски'],ans:1,exp:'Силни јонски врски → потребна е голема енергија за топење.'},
{id:153,theme:'t2',text:'Течните кристали се наоѓаат во:',opts:['Стаклото','LCD екрани на компјутери и телевизори','Дијамантот','Минералите'],ans:1,exp:'LCD = liquid crystal display → течни кристали.'},
{id:154,theme:'t2',text:'Јодот (I₂) во цврста состојба е:',opts:['Атомски кристал','Молекулски кристал','Јонски кристал','Метален кристал'],ans:1,exp:'I₂: неполарни молекули → лондоновски сили → молекулски кристал.'},
{id:155,theme:'t2',text:'Во образувањето ковалентна врска, задолжително е:',opts:['Пренос на е⁻','Препокривање на полупополнети орбитали со спротивни спинови','Присуство на катјон','Јонска решетка'],ans:1,exp:'Ков. врска: полупопол. орбитали со спротивен спин се препокриваат.'},
{id:156,theme:'t2',text:'Највисоката точка на топење меѓу следниве ја има:',opts:['Јодот','Натриум хлоридот','Дијамантот','Железото'],ans:2,exp:'Дијамант: атомски кристал со C-C ков. врски → Tm > 3500°C.'},
{id:157,theme:'t2',text:'Флуорот (F₂) и хлорот (Cl₂) во цврста состојба образуваат:',opts:['Атомски кристали','Јонски кристали','Молекулски кристали','Метални кристали'],ans:2,exp:'F₂, Cl₂: неполарни молекули → слаби лондоновски сили → молекулски кристали.'},
{id:158,theme:'t2',text:'Делокализираните е⁻ во металите можат:',opts:['Да се движат само по атомите','Слободно да се движат низ целата метална структура','Да формираат молекули','Да се сврзат само со Ca²⁺'],ans:1,exp:'Делокализирани = не припаѓаат на конкретен атом → слободно движење.'},
{id:159,theme:'t2',text:'Каква е врската C−H во CH₄ (метан)?',opts:['Јонска','Неполарна ковалентна','Слабо поларна ковалентна','Метална'],ans:2,exp:'C-H: Δχ ≈ 0,4 → слабо поларна ков. врска.'},
{id:160,theme:'t2',text:'Кои молекули меѓу себе НЕМААТ водородни врски?',opts:['H₂O','NH₃','HF','CH₄'],ans:3,exp:'CH₄: H е сврзан со C (не со F,O,N) → нема H-врски.'},
{id:161,theme:'t2',text:'Луисовата формула на Cl₂ покажува:',opts:['Само сврзувачки пар','Еден сврзувачки пар и 6 несврзувачки парови (по 3 на секој Cl)','Три несврзувачки и нула сврзувачки','Две двојни врски'],ans:1,exp:'Cl: 7 вал.е⁻. Во Cl₂: 1 сврзувачки пар + по 3 несврзувачки на секој Cl.'},
{id:162,theme:'t2',text:'Во Периодниот систем, металите се наоѓаат:',opts:['Горе десно','Долу лево','Само во средина','Само во 1 и 2 група'],ans:1,exp:'Метали: лево и долу во PSE (ниска Ei и ел-негатив.).'},
{id:163,theme:'t2',text:'Јонскиот кристал на NaCl во вода:',opts:['Не се растворa','Се раствора, давајќи Na⁺ и Cl⁻ во раствор','Се распаѓа на Na и Cl₂','Образува молекули'],ans:1,exp:'NaCl + H₂O → Na⁺(aq) + Cl⁻(aq). Јонски соединенија се раствораат во поларни растворувачи.'},
{id:164,theme:'t2',text:'Аморфни супстанци се:',opts:['Секогаш проѕирни','Цврсти со нерамна внатрешна градба (без кристална решетка)','Исто со кристали','Само течности'],ans:1,exp:'Аморфни: нема долгогодишна регуларна структура (пр. стакло).'},
{id:165,theme:'t2',text:'Бројот на врски во молекулата N₂H₄ (хидразин) N-H+N-N е:',opts:['4','5','6','7'],ans:1,exp:'N₂H₄: 4 N-H единични врски + 1 N-N единична врска = 5 врски.'},
{id:166,theme:'t2',text:'Кој тип врска има поголема јачина? ',opts:['Единична','Двојна','Тројна','Сите исти'],ans:2,exp:'Тројна > Двојна > Единична.'},
{id:167,theme:'t2',text:'Пример за поларна молекула е:',opts:['Cl₂','H₂','HCl','N₂'],ans:2,exp:'HCl: Δχ(H-Cl) ≈ 1 → поларна (асиметрична молекула со δ+H-Clδ-).'},
{id:168,theme:'t2',text:'Во кристалната решетка на Na, честичките кои ја градат се:',opts:['Na⁺ и Na⁻ јони','Na катјони и делокализирани е⁻','Na молекули','Na атоми поврзани со ков. врски'],ans:1,exp:'Метал: Na⁺ катјони + делокализирани е⁻ (електронски гас).'},
{id:169,theme:'t2',text:'Пример за супстанца кај која постојат и σ и π врски е:',opts:['H₂','NaCl','C₂H₄ (етилен)','Ne'],ans:2,exp:'C₂H₄: C=C (1σ+1π) + C-H (σ) врски.'},
{id:170,theme:'t2',text:'Супстанца изградена исклучиво со јонски врски е:',opts:['H₂O','KBr','C (дијамант)','HCl'],ans:1,exp:'KBr: K⁺ и Br⁻ → чисто јонска.'},
{id:171,theme:'t2',text:'Молекулата CO₂ е:',opts:['Поларна','Неполарна (иако врските се поларни, молекулата е линеарна и симетрична)','Јонска','Без врски'],ans:1,exp:'CO₂: O=C=O линеарна → поларните врски се откажуваат → неполарна молекула.'},
{id:172,theme:'t2',text:'Во споредба со ков. врски, вандервалсовски сили се:',opts:['Посилни','Послаби','Исти','Не можат да се спорат'],ans:1,exp:'Вандервалсовски: многу послаби од ков. или јонски врски.'},
{id:173,theme:'t2',text:'При образување на двојна врска C=C, π-врската се образува со:',opts:['Аксијално препокривање на s','Странично препокривање на p-орбитали','Препокривање на d-орбитали','Нема π во C=C'],ans:1,exp:'C=C: p-орбитали страничко се препокриваат → π-врска.'},
{id:174,theme:'t2',text:'Кој пар покажува дипол-дипол интеракции?',opts:['Ne–Ne','H₂–H₂','HCl–HCl','CH₄–CH₄'],ans:2,exp:'HCl е поларна молекула → HCl-HCl: дипол-дипол интеракции.'},
{id:175,theme:'t2',text:'Калај (Sn) под 13°C преминува во ронлив, прашест сив калај. Ова е пример за:',opts:['Хемиска реакција','Промена на алотропска модификација','Јонизација','Образување на јонска врска'],ans:1,exp:'Бел калај (метален) → сив калај (различна кристална структура) = различни алотропски модификации.'},
{id:176,theme:'t2',text:'Сите јонски соединенија при собни услови се:',opts:['Гасовити','Цврсти','Течни','Растворливи во бензен'],ans:1,exp:'Силни јонски сили → цврста состојба при собни услови.'},
{id:177,theme:'t2',text:'Моделот на „електронски гас" го објаснува:',opts:['Јонската врска','Ковалентната врска','Металната врска','Водородната врска'],ans:2,exp:'Електронски гас = делокализирани е⁻ → объаснување на металната врска и своствата.'},
{id:178,theme:'t2',text:'Кој елемент образува само σ-врски (нема π)?',opts:['Кислород во О₂','Азот во N₂','Водород во H₂','Јаглерод во CO₂'],ans:2,exp:'H₂: H-H, само 1s-1s препокривање по оска → само σ.'},
{id:179,theme:'t2',text:'Луисовскиот симбол за Na (Z=11) покажува:',opts:['8 точки','2 точки','1 точка','0 точки'],ans:2,exp:'Na е во 1-ва група → 1 валентен е⁻ → 1 точка.'},
{id:180,theme:'t2',text:'Во Луисовата формула, секоја цртичка (-) претставува:',opts:['Еден е⁻','Два е⁻ (заеднички пар)','Тројна врска','Метална врска'],ans:1,exp:'Цртичка = 1 заеднички е⁻ пар = 2 електрони.'},
{id:181,theme:'t2',text:'Гасот CH₄ (метан) при сублимирање покажува:',opts:['Многу ниска температура на сублимирање','Многу висока','Не сублимира','Јонска декомпозиција'],ans:0,exp:'CH₄: неполарна молекула, само лондоновски сили → ниска Tm и точка на вриење.'},
{id:182,theme:'t2',text:'За образување π-врска е потребно прво да постои:',opts:['π-врска','σ-врска','Јонска врска','Метална врска'],ans:1,exp:'σ-врската е примарна → π може да се образува само откако е формирана σ.'},
{id:183,theme:'t2',text:'Бројот на π-врски во ацетилен (C₂H₂, HC≡CH) е:',opts:['1','2','3','0'],ans:1,exp:'C≡C: тројна = 1σ + 2π. Плус два C-H (σ). Вкупно π = 2.'},
{id:184,theme:'t2',text:'Кое од следниве е молекулски кристал?',opts:['NaCl','Fe','SiO₂','CO₂ (сув мраз)'],ans:3,exp:'CO₂ (сув мраз): молекули CO₂ → лондоновски сили → молекулски кристал.'},
{id:185,theme:'t2',text:'Концептот на „заеднички е⁻ пар" го воведе:',opts:['Менделеев','Луис','Паули','Хунд'],ans:1,exp:'Гилберт Н. Луис → луисовска теорија за хемиска врска.'},
{id:186,theme:'t2',text:'Во молекулата H₂O, бројот на H-врски кои секоја молекула може да образува е:',opts:['1','2','3','4'],ans:3,exp:'H₂O: 2 OH → може да даде 2 H, + 2 lone pairs O → 4 H-врски.'},
{id:187,theme:'t2',text:'При растворање на јонски соединенија во вода, јоните:',opts:['Остануваат соврзани','Се раздвојуваат и се опкружуваат со H₂O молекули','Образуваат метален кристал','Ги губат полнежите'],ans:1,exp:'Дисоцијација: јоните се опкружуваат со H₂O (хидратација).'},
{id:188,theme:'t2',text:'Кој тип врска НЕ е хемиска врска?',opts:['Јонска','Ковалентна','Метална','Вандервалсовска'],ans:3,exp:'Вандервалсовски сили = физички меѓумолекулски интеракции, не хемиски врски.'},
{id:189,theme:'t2',text:'Разликата Δχ = 3,2 (Na-F) укажува на:',opts:['Неполарна ков.','Поларна ков.','Јонска','Метална'],ans:2,exp:'Δχ > 2 → јонска врска (NaF).'},
{id:190,theme:'t2',text:'Во кристалната решетка на KBr, секој K⁺ е опкружен со:',opts:['6 K⁺','6 Br⁻ (координациски број 6)','4 Br⁻','8 Br⁻'],ans:1,exp:'KBr: иста кристална структура со NaCl → координациски број 6.'},
{id:191,theme:'t2',text:'Кај металите, точката на топење расте со:',opts:['Поголем атомски радиус','Поголема јачина на металната врска (повеќе вал.е⁻)','Помалку е⁻','Поголема маса'],ans:1,exp:'Посилна метална врска → повисока точка на топење (W е мета со највисока Tm).'},
{id:192,theme:'t2',text:'Суп. SiO₂ (силициум диоксид) е:',opts:['Молекулски кристал','Атомски кристал','Јонски кристал','Метален кристал'],ans:1,exp:'SiO₂: секој Si е ков. врзан со 4 O → атомски кристал (висока Tm, многу тврдо).'},
{id:193,theme:'t2',text:'Во кои соединенија катјонот и анјонот имаат ИСТА ел. конфигурација?',opts:['NaCl (Na⁺ и Cl⁻ имаат исти е⁻ броеви)','KBr (K⁺ и Br⁻ ист?... NE)','CaO (Ca²⁺ и O²⁻ конф. на Ar и Ne)','Na₂O (Na⁺ и O²⁻)'],ans:0,exp:'Na⁺: [Ne] → 10е. Cl⁻: [Ar]... Всушност: NaCl: Na⁺=[Ne] Cl⁻=[Ar] → НЕ. CaO: Ca²⁺=[Ar], O²⁻=[Ne] → НЕ иста. NaF: Na⁺=[Ne], F⁻=[Ne] → ДА, ИСТА!'},
{id:194,theme:'t2',text:'Кој е примерот на неполарна ковалентна врска?',opts:['H–F','H–Cl','H–H','O–H'],ans:2,exp:'H-H: Δχ=0 → чисто неполарна ков. врска.'},
{id:195,theme:'t2',text:'Во молекулата PH₃, видот на врските P-H е:',opts:['Јонска','Поларна ков. (P е поел-негативен)','Метална','Неполарна ков.'],ans:1,exp:'P-H: P поел-негативен → δ-P-Hδ+ → поларна ков.'},
{id:196,theme:'t2',text:'Цврста агрегатна состојба кај супстанците со водородни врски е поврзана со:',opts:['Поголема точка на топење во споредба со аналогни без H-врска','Помала точка на топење','Неспособност за растворање','Метален карактер'],ans:0,exp:'H-врски додаваат сила → потребна поголема Т за топење.'},
{id:197,theme:'t2',text:'Во луисовски формули, „несврзувачки електронски парови" се означуваат со:',opts:['Двојна цртичка','Точки покрај атомот','Прекрстена линија','Внатре во круг'],ans:1,exp:'Несврзувачки парови = точки (парови) покрај симболот на атомот.'},
{id:198,theme:'t2',text:'Највисока точка на вриење меѓу H₂O, H₂S, H₂Se, H₂Te е кај:',opts:['H₂S','H₂Se','H₂O','H₂Te'],ans:2,exp:'H₂O: водородни врски О-Н···О → многу силни → највисока точка на вриење.'},
{id:199,theme:'t2',text:'Бројот на σ-врски во молекулата C₂H₄ (етилен) е:',opts:['4','5','6','3'],ans:1,exp:'C₂H₄: C=C (1σ+1π) + 4 C-H(σ) = вкупно 5 σ.'},
{id:200,theme:'t2',text:'Супстанца со само лондоновски сили е:',opts:['NaCl','H₂O','I₂','NH₃'],ans:2,exp:'I₂: неполарна молекула → само лондоновски (дисперзиски) сили.'},

// ТЕМА 3: НЕОРГАНСКИ СОЕДИНЕНИЈА (100)
// ============================
{id:201,theme:'t3',text:'Оксидите се бинарни соединенија на:',opts:['Два метала','Кислород со некој друг елемент','Водород со неметали','Два неметали'],ans:1,exp:'Оксид: O + некој елемент (освен F₂O и пероксидите).'},
{id:202,theme:'t3',text:'Киселинскиот оксид е оксид кој:',opts:['Со вода дава база','Со вода дава киселина и/или реагира со бази','Не реагира ни со вода ни со бази','Само со метали реагира'],ans:1,exp:'Кисел. оксид: H₂O → киселина; реагира со бази → сол.'},
{id:203,theme:'t3',text:'Базниот оксид е оксид кој:',opts:['Со вода дава киселина','Со вода дава база и/или реагира со киселини','Е неутрален','Само неметален оксид'],ans:1,exp:'Базен оксид: H₂O → база (хидроксид); реагира со кис. → сол.'},
{id:204,theme:'t3',text:'Пример за амфотерен оксид е:',opts:['CaO','SO₃','Al₂O₃','CO'],ans:2,exp:'Al₂O₃: реагира и со киселини и со бази → амфотерен.'},
{id:205,theme:'t3',text:'Пример за неутрален (индиферентен) оксид е:',opts:['MgO','NO','SO₂','P₂O₅'],ans:1,exp:'NO, CO, N₂O → неутрални оксиди, не реагираат ни со H₂O, ни со кис. ни со бази.'},
{id:206,theme:'t3',text:'Номенклатурата Fe₂O₃ е:',opts:['Железо оксид','Железо(II) оксид','Железо(III) оксид','Железо(IV) оксид'],ans:2,exp:'Fe₂O₃: 2x=3·2=6, x=3 → железо(III) оксид.'},
{id:207,theme:'t3',text:'Дифосфор пентаоксид (P₂O₅) е:',opts:['Базен оксид','Амфотерен','Киселински оксид','Неутрален оксид'],ans:2,exp:'P₂O₅: неметален оксид → типичен киселински оксид.'},
{id:208,theme:'t3',text:'Реакцијата MgO + H₂O → ?',opts:['MgH₂ + O₂','Mg(OH)₂','MgO + H₂','MgHO'],ans:1,exp:'MgO + H₂O → Mg(OH)₂ (магнезиум хидроксид = база).'},
{id:209,theme:'t3',text:'Реакцијата SO₂ + H₂O → ?',opts:['SO₃ + H₂','H₂SO₄','H₂SO₃','S + H₂O₂'],ans:2,exp:'SO₂ + H₂O → H₂SO₃ (сулфуреста киселина).'},
{id:210,theme:'t3',text:'Кисел. оксиди реагираат со бази. Реакцијата CO₂ + 2NaOH → ?',opts:['Na₂CO₃ + H₂O','NaOH + CO','Na₂O + CO₂ + H₂O','NaCO₃ + H'],ans:0,exp:'CO₂ + 2NaOH → Na₂CO₃ + H₂O.'},
{id:211,theme:'t3',text:'Главни стакленички гасови се:',opts:['O₂ и N₂','H₂O пареа, CO₂, CH₄, N₂O','Ar и Ne','Cl₂ и SO₂'],ans:1,exp:'Стакленички гасови: H₂O пареа, CO₂, CH₄, N₂O, CFCs.'},
{id:212,theme:'t3',text:'Ефектот на стаклена градина е:',opts:['Прекумерно ладење на Земјата','Задржување на инфрацрвеното зрачење во атмосферата → загревање','Уништување на озонот','Ниво на морето се зголемува директно'],ans:1,exp:'Стакленички гасови апсорбираат IR → атмосферата се загрева.'},
{id:213,theme:'t3',text:'Највисоки потенцијален придонес за CO₂ во атмосферата:',opts:['Соларни електрани','Хидроелектрани','Термоелектрани','Ветроелектрани'],ans:2,exp:'Термоелектрани согоруваат фосилни горива → голема CO₂ емисија.'},
{id:214,theme:'t3',text:'Формулата на калциум оксид е:',opts:['CaO₂','Ca₂O','CaO','Ca₃O₂'],ans:2,exp:'Ca е двовалентен, O е двовалентен → CaO.'},

// State
let state = {
  points: 0, correct: 0, wrong: 0, answered: 0,
  results: {}, // id → 'correct'|'wrong'
  filter: 'all',
  order: [...Array(300).keys()] // indices
};

function renderAll() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  state.order.forEach(idx => {
    const q = ALL_QUESTIONS[idx];
    container.appendChild(buildCard(q));
  });
  applyFilter();
}

function buildCard(q) {
  const res = state.results[q.id];
  const div = document.createElement('div');
  div.className = 'question-card' + (res === 'correct' ? ' answered-correct' : res === 'wrong' ? ' answered-wrong' : '');
  div.id = 'card-' + q.id;

  const tagClass = {t1:'tag-t1', t2:'tag-t2', t3:'tag-t3'}[q.theme];
  const tagText = {t1:'Тема 1', t2:'Тема 2', t3:'Тема 3'}[q.theme];

  let optsHTML = q.opts.map((o, i) => {
    let cls = '';
    if (res) {
      if (i === q.ans) cls = 'correct';
      else if (res === 'wrong' && state.results[q.id + '_chosen'] === i) cls = 'wrong';
    }
    return `<button class="option-btn ${cls}" ${res ? 'disabled' : ''} onclick="answer(${q.id}, ${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
  }).join('');

  const fbClass = res === 'correct' ? 'ok' : 'nope';
  const fbMsg = res === 'correct' ? '✅ Точно! ' + q.exp : res === 'wrong' ? '❌ Точниот одговор: ' + q.opts[q.ans] + '. ' + q.exp : '';
  const fbShow = res ? 'show' : '';

  div.innerHTML = `
    <div class="card-top">
      <span class="q-num">#${q.id}</span>
      <span class="q-tag ${tagClass}">${tagText}</span>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options" id="opts-${q.id}">${optsHTML}</div>
    <div class="feedback ${fbClass} ${fbShow}" id="fb-${q.id}">${fbMsg}</div>
    ${res ? `<button class="reset-btn" onclick="resetCard(${q.id})">↺ Ресетирај ова прашање</button>` : ''}
  `;
  return div;
}

function answer(qid, chosen) {
  if (state.results[qid]) return;
  const q = ALL_QUESTIONS.find(x => x.id === qid);
  const correct = chosen === q.ans;
  state.results[qid] = correct ? 'correct' : 'wrong';
  state.results[qid + '_chosen'] = chosen;
  state.answered++;
  if (correct) { state.correct++; state.points += 10; }
  else { state.wrong++; state.points = Math.max(0, state.points - 3); }
  updateScore();

  // Update card
  const card = document.getElementById('card-' + qid);
  card.className = 'question-card ' + (correct ? 'answered-correct' : 'answered-wrong');
  const optBtns = card.querySelectorAll('.option-btn');
  optBtns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.className = 'option-btn correct';
    else if (i === chosen) b.className = 'option-btn wrong';
  });
  const fb = document.getElementById('fb-' + qid);
  fb.className = 'feedback ' + (correct ? 'ok' : 'nope') + ' show';
  fb.textContent = correct ? '✅ Точно! ' + q.exp : '❌ Точниот одговор: ' + q.opts[q.ans] + '. ' + q.exp;
  // Add reset btn
  const rb = document.createElement('button');
  rb.className = 'reset-btn';
  rb.textContent = '↺ Ресетирај ова прашање';
  rb.onclick = () => resetCard(qid);
  card.appendChild(rb);
}

function resetCard(qid) {
  const r = state.results[qid];
  if (r === 'correct') { state.correct--; state.points = Math.max(0, state.points - 10); }
  else if (r === 'wrong') { state.wrong++; state.points += 3; }
  if (r) state.answered--;
  delete state.results[qid];
  delete state.results[qid + '_chosen'];
  updateScore();
  const q = ALL_QUESTIONS.find(x => x.id === qid);
  const card = document.getElementById('card-' + qid);
  const newCard = buildCard(q);
  card.replaceWith(newCard);
}

function updateScore() {
  document.getElementById('scorePoints').textContent = state.points;
  document.getElementById('scoreCorrect').textContent = state.correct;
  document.getElementById('scoreWrong').textContent = state.wrong;
  document.getElementById('scoreTotal').textContent = state.answered + '/300';
  const pct = Math.round((state.answered / 300) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = state.answered + ' / 300 прашања';
  document.getElementById('progressPct').textContent = pct + '%';
}

function filterQ(type) {
  state.filter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const cards = document.querySelectorAll('.question-card');
  cards.forEach(card => {
    const id = parseInt(card.id.replace('card-', ''));
    const q = ALL_QUESTIONS.find(x => x.id === id);
    let show = true;
    if (state.filter === 't1') show = q.theme === 't1';
    else if (state.filter === 't2') show = q.theme === 't2';
    else if (state.filter === 't3') show = q.theme === 't3';
    else if (state.filter === 'wrong') show = state.results[id] === 'wrong';
    else if (state.filter === 'unanswered') show = !state.results[id];
    card.classList.toggle('hidden', !show);
  });
}

function shuffleAll() {
  for (let i = state.order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
  }
  renderAll();
}

function resetAll() {
  if (!confirm('Сигурно сакаш да ги ресетираш сите одговори?')) return;
  state.results = {};
  state.points = 0; state.correct = 0; state.wrong = 0; state.answered = 0;
  updateScore();
  renderAll();
}

function showFinalScore() {
  const pct = state.answered > 0 ? Math.round((state.correct / state.answered) * 100) : 0;
  let grade = '';
  if (pct >= 95) grade = '🏆 Совршено! Спремен за натпревар!';
  else if (pct >= 85) grade = '🥇 Одличен резултат!';
  else if (pct >= 70) grade = '🥈 Многу добро!';
  else if (pct >= 55) grade = '📚 Добро, продолжи со учење!';
  else grade = '💪 Не се откажувај, вежбај повеќе!';
  document.getElementById('modalBigScore').textContent = state.points;
  document.getElementById('modalSubtext').textContent = 'поени';
  document.getElementById('modalGrade').textContent = grade;
  document.getElementById('modalStats').textContent = `Точни: ${state.correct} | Погрешни: ${state.wrong} | Точност: ${pct}%`;
  document.getElementById('modalOverlay').classList.add('show');
}

// Init
renderAll();
updateScore();
</script>
